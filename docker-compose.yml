version: "3.9"

# ── Quishing Guard — Local Development Stack ──────────────────────────────────
# Usage:
#   docker compose up          # start API + PWA dev server
#   docker compose up --build  # rebuild after code changes

services:

  # ── Flask API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-not-for-production
      - MAX_REDIRECT_HOPS=10
      - RESOLVER_TIMEOUT=5
      - CORS_ORIGINS=*
      - PORT=5000
    volumes:
      - ./backend/data:/app/data          # persist community blocklist
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── PWA static dev server ─────────────────────────────────────────────────
  pwa:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./pwa:/usr/share/nginx/html:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
